<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeatHomeHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --green: #3a5a40;
      --green-light: #f0f4f0;
      --green-mid: #5a7d61;
      --text: #2b2b2b;
      --muted: #7a7a6e;
      --border: #e0ddd6;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--green);
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--green);
      margin: 28px auto;
      border-radius: 2px;
    }

    .intro {
      text-align: center;
      max-width: 480px;
      margin: 0 auto 48px;
      padding: 0 24px;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
    }

    .boards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px 80px;
      width: 100%;
    }
